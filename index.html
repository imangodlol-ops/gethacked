<!DOCTYPE html>
<html>
<head>
<title>Totally Normal Website</title>

<style>

body{
  background-color: lightblue;
  font-family: Arial;
  text-align:center;
}

/* button */

button{
  font-size:30px;
  padding:15px 40px;
  background:purple;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:rgb(120,0,200);
}

/* hacker screen */

#hacker{
  display:none;
  background:black;
  color:#00ff00;
  font-family:monospace;
  height:100vh;
  padding:30px;
  text-align:left;
}

#terminal{
  font-size:22px;
}

</style>

<script>

let lines = [
"Connecting to super secret server...",
"Downloading memes...",
"Bypassing school firewall...",
"Accessing cat database...",
"Sending prank signal...",
"YOU GOT PRANKED 😜"
];

let i = 0;

function start(){

document.getElementById("main").style.display="none";
document.getElementById("hacker").style.display="block";

type();

}

function type(){

if(i < lines.length){

document.getElementById("terminal").innerHTML += lines[i] + "<br>";

i++;

setTimeout(type,900);

}

}

</script>

</head>

<body>

<div id="main">

<h1>HELLO 👀</h1>

<h2>inte gjort av wille</h2>

<img src="https://th.bing.com/th/id/OIP.yrQpOL7GLOF8-9x7C3fPpQHaFI?w=289&h=200&c=7&r=0&o=7&pid=1.7&rm=3" width="300">

<br><br>

<button onclick="start()">CLICK ME</button>

<br><br>

<img src="https://tse2.mm.bing.net/th/id/OIP.H4IqhU-WYF6jaHEk_o5-vQHaE7?rs=1&pid=ImgDetMain&o=7&rm=3" width="500">

</div>


<div id="hacker">

<h2>HACKER TERMINAL</h2>

<div id="terminal"></div>

</div>

</body>
</html>
