<!DOCTYPE html>
<html>
<head>
<title>Hacker Screen</title>

<style>
body{
  background:black;
  color:#00ff00;
  font-family: monospace;
  font-size:20px;
  padding:20px;
}

#terminal{
  white-space:pre-line;
}
</style>

<script>
let text = [
"Connecting to secure server...",
"Bypassing firewall...",
"Access granted ✔",
"Downloading files...",
"Password cracked!",
"System control acquired..."
];

let i = 0;

function typeLine(){
  if(i < text.length){
    document.getElementById("terminal").innerHTML += text[i] + "\n";
    i++;
    setTimeout(typeLine, 1000);
  }
}

window.onload = typeLine;
</script>

</head>

<body>

<h1>REMOTE ACCESS TERMINAL</h1>
<div id="terminal"></div>

</body>
</html>
