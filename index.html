<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Totally Normal Website</title>

<style>

body{
  background-color: lightblue;
  font-family: Arial, sans-serif;
  text-align:center;
}

/* main screen */

#main{
  padding-top:50px;
}

button{
  font-size:30px;
  padding:15px 40px;
  background:purple;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:rgb(130,0,200);
}

/* hacker screen */

#hacker{
  display:none;
  background:black;
  color:#00ff00;
  font-family:monospace;
  height:100vh;
  padding:30px;
  text-align:left;
}

#terminal{
  font-size:22px;
  line-height:1.6;
}

</style>

<script>

let lines = [
"Connecting to server...",
"Bypassing firewall...",
"Downloading memes...",
"Accessing cat database...",
"Sending prank signal...",
"YOU GOT PRANKED 😜"
];

let i = 0;

function startHack(){

document.getElementById("main").style.display="none";
document.getElementById("hacker").style.display="block";

typeLine();

}

function typeLine(){

if(i < lines.length){

document.getElementById("terminal").innerHTML += lines[i] + "<br>";

i++;

setTimeout(typeLine,1000);

}
